## services ####################################################################
################################################################################
  - path: "apps-services/multitenant-dashboard"
    name: "Multitenant Dashboard"
    description: |
      An app for sharing a web server (or dashboard), within a Slurm job, with
      other users.
    software: "Multitenant Apps"
    app_type: "batch-connect-basic"
    tags:
      - "multitenant"
      - "shared"
      - "webserver"
      - "data-sharing"
    maintainer:
