title: "Multitenant Apps"
description: |
  The Multitenant Apps framework was developed for supporting LLMs, databases,
  and other services on traditional, job-based HPC infrastructure through Open
  OnDemand (OOD). It allows for controlled and secure sharing of these services
  between select users, and can greatly reduce hardware overhead since users share
  the same resources. It is also an effective method for delivering content to
  users within the OOD interface, which is especially useful within classrooms,
  research groups, and even departments.
website: "https://github.com/WFU-HPC/OOD-MultitenantApps"
docs: "https://github.com/WFU-HPC/OOD-MultitenantApps/blob/main/README.md"
tags:
  - "multitenant"
  - "services"
  - "ai"
  - "llm"
  - "database"
  - "data-sharing"
  - "webserver"
  - "api"
  - "shared"
  - "instruction"
  - "classroom"
  - "client"
  - "chatbot"
  - "python"
maintainer:
  name: "Sean Anderson"
  support_url: "https://github.com/WFU-HPC/OOD-MultitenantApps/issues"
apps:
